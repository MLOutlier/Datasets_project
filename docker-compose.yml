# Docker Compose конфигурация для проекта "Dataset для ИИ"
# Сервисы: MongoDB, Redis, Backend (Django), Celery, Frontend (React)

services:
  # MongoDB - база данных
  db:
    image: mongo:7
    container_name: dataset_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    env_file:
      - .env
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_DB:-ai_dataset_db}
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis - очередь задач для Celery
  redis:
    image: redis:7-alpine
    container_name: dataset_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend - Django API сервер
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataset_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # MongoDB (из .env)
      - MONGO_URI=${MONGO_URI}
      # Redis (из .env)
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      # Django (из .env)
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=${DEBUG}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8000

  # Celery Worker - обработка фоновых задач
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataset_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A config worker --loglevel=info --pool=solo

  # Frontend - React приложение на Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dataset_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - web
    ports:
      - "3001:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  mongo_data:
    name: dataset_mongo_data
